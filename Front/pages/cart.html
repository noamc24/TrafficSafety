<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>עגלה | המרכז לבטיחות בתנועה</title>
  <meta name="description" content="ריכוז מוצרים שנבחרו, עדכון כמויות ושליחת בקשת הזמנה." />

  <link rel="icon" type="image/png" href="/assets/Icons/TSCLogo.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />

  <link rel="stylesheet" href="/css/style.css?v=20260409" />
  <link rel="stylesheet" href="/css/navbar.css?v=20260409" />
  <link rel="stylesheet" href="/css/accessibility.css" />
  <link rel="stylesheet" href="/css/cart.css?v=20260409" />
</head>
<body>
  <div id="navbarMount"></div>

  <main class="container py-4 py-lg-5" id="main-content">
    <section class="cart-layout card shadow-sm border-0">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <h1 class="cart-title m-0">עגלת קניות</h1>
        <a href="/store" class="btn btn-outline-dark">חזרה לחנות</a>
      </div>

      <p class="text-muted mb-4">כאן מרוכזים כל המוצרים שבחרת. ניתן לעדכן כמות, להסיר פריטים או לשלוח בקשת הזמנה.</p>

      <div id="cartEmpty" class="alert alert-light border d-none">
        העגלה ריקה כרגע. אפשר להוסיף מוצרים מעמוד החנות.
      </div>

      <div id="cartItems" class="cart-items"></div>

      <div id="cartSummary" class="cart-summary d-none">
        <div class="cart-summary__meta">
          <span>סה״כ פריטים בעגלה:</span>
          <strong id="cartItemsCount">0</strong>
        </div>
        <div class="cart-summary__actions">
          <button id="clearCartBtn" type="button" class="btn btn-outline-danger">ריקון עגלה</button>
          <button id="sendWhatsappBtn" type="button" class="btn btn-success fw-bold">
            <i class="bi bi-whatsapp"></i>
            שליחת בקשה בוואטסאפ
          </button>
        </div>
      </div>
    </section>
  </main>

  <div id="footerMount"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/accessibility.js"></script>
  <script src="/js/accessibility-loader.js"></script>
  <script src="/js/main.js?v=20260129v2"></script>
  <script src="/js/cart.js?v=20260409"></script>
</body>
</html>
