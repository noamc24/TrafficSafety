<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מוצר | המרכז לבטיחות בתנועה</title>
  <meta name="description" content="פרטי מוצר, סוגים וגדלים, והוספה לעגלה." />

  <link rel="icon" type="image/png" href="/assets/Icons/TSCLogo.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />

  <link rel="stylesheet" href="/css/style.css?v=20260409" />
  <link rel="stylesheet" href="/css/navbar.css?v=20260409" />
  <link rel="stylesheet" href="/css/accessibility.css" />
  <link rel="stylesheet" href="/css/product.css?v=20260409" />
</head>
<body>
  <div id="navbarMount"></div>

  <main class="product-page container py-4 py-lg-5" id="main-content">
    <a href="/store" class="product-back-link">
      <i class="bi bi-arrow-right"></i>
      חזרה לחנות
    </a>

    <section class="product-layout card shadow-sm border-0">
      <div class="row g-4">
        <div class="col-12 col-lg-6">
          <div class="product-gallery">
            <img id="mainProductImage" class="product-gallery__main" src="" alt="תמונת מוצר כללי" width="1000" height="750" decoding="async" fetchpriority="high" />
            <div id="productThumbs" class="product-gallery__thumbs"></div>
          </div>
        </div>

        <div class="col-12 col-lg-6">
          <div class="product-content">
            <span id="productCategory" class="product-chip"></span>
            <h1 id="productTitle" class="product-title"></h1>
            <p id="productDescription" class="product-short-desc"></p>

            <div id="productOptions" class="product-options"></div>

            <div class="product-actions">
              <button id="addToCartBtn" type="button" class="btn btn-warning fw-bold text-dark">
                הוסף לעגלה
              </button>
              <a href="/cart" class="btn btn-outline-dark fw-bold">מעבר לעגלה</a>
              <span id="addToCartFeedback" class="product-feedback" aria-live="polite"></span>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="footerMount"></div>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="/js/accessibility.js"></script>
  <script defer src="/js/accessibility-loader.js"></script>
  <script defer src="/js/main.js?v=20260129v2"></script>
  <script defer src="/js/products-data.js"></script>
  <script defer src="/js/product.js?v=20260409v4"></script>
</body>
</html>
