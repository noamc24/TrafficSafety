<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>צור קשר | המרכז לבטיחות בתנועה</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="navbarMount"></div>

  <main class="container my-5">
    <div class="row g-4">
      <div class="col-12 col-lg-6">
        <h1 class="fw-bold mb-3">צור קשר</h1>
        <p class="text-muted">השאר פרטים ונחזור אליך.</p>

        <form id="contactForm" class="card shadow-sm p-3">
          <div class="mb-3">
            <label class="form-label">שם מלא *</label>
            <input name="fullName" class="form-control" placeholder="לדוגמה: נועם כהן" required />
          </div>

          <div class="mb-3">
            <label class="form-label">אימייל *</label>
            <input name="email" type="email" class="form-control" placeholder="name@example.com" required />
          </div>

          <div class="mb-3">
            <label class="form-label">טלפון</label>
            <input name="phone" class="form-control" placeholder="05X-XXXXXXX" />
          </div>

          <div class="mb-3">
            <label class="form-label">הודעה *</label>
            <textarea name="message" rows="4" class="form-control" placeholder="מה צריך לבצע?" required></textarea>
          </div>

          <button class="btn btn-warning fw-bold text-dark" type="submit">שלח</button>
          <div id="formAlert" class="mt-3"></div>
        </form>
      </div>

      <div class="col-12 col-lg-6">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h5 class="fw-bold">פרטי התקשרות</h5>
            <p class="text-muted mb-1">טלפון: <span class="fw-semibold">בהמשך נוסיף</span></p>
            <p class="text-muted mb-3">אימייל: <span class="fw-semibold">בהמשך נוסיף</span></p>
            <div class="alert alert-light border mb-0">
              טיפ: בהמשך נחבר פה גם מפת Google + כפתור וואטסאפ.
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footerMount"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
