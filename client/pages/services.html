<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>שירותים | המרכז לבטיחות בתנועה</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="navbarMount"></div>

  <main class="container my-5">
    <h1 class="fw-bold mb-3">שירותים</h1>
    <p class="text-muted">כאן נשים את רשימת השירותים עם פירוט קצר לכל שירות.</p>

    <div class="row g-3 mt-2">
      <div class="col-12 col-md-6 col-lg-4">
        <div class="card h-100 shadow-sm">
          <div class="card-body">
            <h5 class="fw-bold">סימון כבישים</h5>
            <p class="text-muted mb-0">סימון/חידוש קווי הפרדה, מעברי חציה, חצים ועוד.</p>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-6 col-lg-4">
        <div class="card h-100 shadow-sm">
          <div class="card-body">
            <h5 class="fw-bold">שילוט ותמרור</h5>
            <p class="text-muted mb-0">התקנה, החלפה ותחזוקה של שילוט ותמרורים.</p>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-6 col-lg-4">
        <div class="card h-100 shadow-sm">
          <div class="card-body">
            <h5 class="fw-bold">הסדרי תנועה זמניים</h5>
            <p class="text-muted mb-0">תכנון וביצוע ניהול תנועה בזמן עבודות.</p>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-4">
      <a href="/contact" class="btn btn-warning fw-bold text-dark">קבל הצעת מחיר</a>
    </div>
  </main>

  <div id="footerMount"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
